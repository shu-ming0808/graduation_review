<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>畢業學分檢核系統</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; color: #333; padding: 20px; }
    h1 { text-align: center; margin-bottom: 24px; font-size: 24px; }

    .upload-area {
      max-width: 600px; margin: 0 auto 32px; padding: 48px 24px;
      border: 2px dashed #aab; border-radius: 12px; background: #fff;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .upload-area.dragover { border-color: #4a90d9; background: #eef4fc; }
    .upload-area p { font-size: 16px; color: #666; margin-bottom: 12px; }
    .upload-area .hint { font-size: 13px; color: #999; }
    .upload-area input[type="file"] { display: none; }
    .upload-area .btn {
      display: inline-block; margin-top: 12px; padding: 8px 24px;
      background: #4a90d9; color: #fff; border: none; border-radius: 6px;
      font-size: 14px; cursor: pointer;
    }
    .upload-area .btn:hover { background: #3a7bc8; }

    .student-info {
      max-width: 800px; margin: 0 auto 24px; padding: 20px 24px;
      background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: none;
    }
    .student-info h2 { font-size: 18px; margin-bottom: 12px; }
    .student-info .info-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px 24px;
    }
    .student-info .info-item { font-size: 14px; }
    .student-info .info-item .label { color: #888; }

    .cards-container {
      max-width: 1000px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
    }

    .semester-card {
      background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .semester-card .card-header {
      padding: 12px 16px; background: #4a90d9; color: #fff; font-size: 15px; font-weight: bold;
    }
    .semester-card .card-body { padding: 0; }
    .semester-card table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .semester-card th {
      text-align: left; padding: 8px 12px; background: #f7f8fa; border-bottom: 1px solid #e8e8e8;
      font-weight: 600; color: #555;
    }
    .semester-card td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
    .semester-card tr:last-child td { border-bottom: none; }

    .score-fail { color: #d9534f; font-weight: bold; }
    .score-pending { color: #999; font-style: italic; }
    .score-pass { color: #333; }

    .card-footer {
      padding: 8px 16px; background: #f7f8fa; border-top: 1px solid #e8e8e8;
      font-size: 13px; color: #555; text-align: right;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>畢業學分檢核系統</h1>

  <div class="upload-area" id="uploadArea">
    <p>拖放 JSON 檔案到這裡，或點擊選擇檔案</p>
    <p class="hint">支援 exportStudentData.json</p>
    <button class="btn">選擇檔案</button>
    <input type="file" id="fileInput" accept=".json">
  </div>

  <div class="student-info" id="studentInfo">
    <h2>學生資訊</h2>
    <div class="info-grid" id="infoGrid"></div>
  </div>

  <div class="cards-container" id="cardsContainer"></div>

  <script>
  </script>
</body>
</html>
